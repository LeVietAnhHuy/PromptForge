name: promptforge
description: "PromptForge is a Flutter-first, cross-platform, local-first prompt workflow engine."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'
  flutter: '>=3.44.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^13.2.0
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.21
  path_provider: ^2.1.2
  path: ^1.9.0
  uuid: ^4.3.3
  file_selector: ^1.1.0
  archive: ^4.0.9
  flutter_markdown_plus: ^1.0.7
  intl: ^0.20.2
  flutter_secure_storage: ^10.3.1
  google_generative_ai: ^0.4.7
  flutter_svg: ^2.3.0
  url_launcher: ^6.3.2
  flutter_highlight: ^0.7.0
  pdfrx: ^2.4.3
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  dart_mcp: ^0.5.1
  sqlite3: ^3.3.2
  json_rpc_2: ^4.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  drift_dev: ^2.16.0
  flutter_launcher_icons: ^0.14.4
  msix: ^3.16.13
  stream_channel: ^2.1.4

flutter:
  uses-material-design: true

  assets:
    - assets/provider_icons/
    - assets/pricing/

  fonts:
    # Display / brand — Space Grotesk (OFL). Variable weight axis.
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Variable.ttf
    # Body — Atkinson Hyperlegible (OFL). Static Regular + Bold for true weights.
    - family: AtkinsonHyperlegible
      fonts:
        - asset: assets/fonts/AtkinsonHyperlegible-Regular.ttf
        - asset: assets/fonts/AtkinsonHyperlegible-Bold.ttf
          weight: 700
    # Monospace — JetBrains Mono (OFL). Variable weight axis.
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Variable.ttf

# Windows MSIX packaging (dart run msix:create). Produced UNSIGNED for now
# (sign_msix: false) — no certificate/signtool needed in CI. To distribute,
# sign with a real certificate; see docs/RELEASING.md. The release CI overrides
# msix_version from the pubspec app version (e.g. --version 1.0.0.0).
msix_config:
  display_name: PromptForge
  publisher_display_name: Le Viet Anh Huy
  identity_name: io.github.levietanhhuy.promptforge
  publisher: CN=Le Viet Anh Huy
  msix_version: 1.0.0.0
  logo_path: assets/brand/promptforge_icon_1024.png
  capabilities: internetClient
  sign_msix: false
  output_name: promptforge
