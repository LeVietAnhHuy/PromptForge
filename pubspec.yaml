name: promptforge
description: "PromptForge is a Flutter-first, cross-platform, local-first prompt workflow engine."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^13.2.0
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.21
  path_provider: ^2.1.2
  path: ^1.9.0
  uuid: ^4.3.3
  file_selector: ^1.1.0
  archive: ^4.0.9
  flutter_markdown_plus: ^1.0.7
  intl: ^0.20.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  drift_dev: ^2.16.0

flutter:
  uses-material-design: true
