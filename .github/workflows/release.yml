name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write # create/upload the GitHub Release

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from pubspec
        id: ver
        run: |
          echo "version=$(awk -F'[:+]' '/^version:/{gsub(/ /,"",$2);print $2;exit}' pubspec.yaml)" >> "$GITHUB_OUTPUT"

      - name: Install Linux desktop + media/secure-storage deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libmpv-dev mpv libsecret-1-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true

      - run: flutter pub get
      - name: Build ${{ matrix.platform }} (release)
        run: flutter build ${{ matrix.platform }} --release

      - name: Package Linux (tar.gz + best-effort AppImage)
        if: runner.os == 'Linux'
        run: bash scripts/package_linux.sh "${{ steps.ver.outputs.version }}"

      - name: Package Windows (portable zip + unsigned MSIX)
        if: runner.os == 'Windows'
        run: |
          set -euo pipefail
          V="${{ steps.ver.outputs.version }}"
          mkdir -p dist
          REL="build/windows/x64/runner/Release"
          7z a -tzip "dist/promptforge-$V-windows-x64.zip" "./$REL/*"
          dart run msix:create --version "$V.0"
          mv "$REL/promptforge.msix" "dist/promptforge-$V-windows-x64.msix"
          ls -la dist

      - name: Package macOS (zip + dmg, unsigned)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          V="${{ steps.ver.outputs.version }}"
          mkdir -p dist
          APP="build/macos/Build/Products/Release/PromptForge.app"
          ditto -c -k --keepParent "$APP" "dist/promptforge-$V-macos.zip"
          hdiutil create -volname PromptForge -srcfolder "$APP" -ov -format UDZO \
            "dist/promptforge-$V-macos.dmg"
          ls -la dist

      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Draft GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - run: ls -la dist
      - name: Create/Update draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/*
